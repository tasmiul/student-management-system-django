{% for field in form %}
  <div>
    <label for="{{ field.id_for_label }}" class="mb-1 block text-sm font-medium text-slate-700">
      {{ field.label }}{% if field.field.required %}<span class="text-rose-600">*</span>{% endif %}
    </label>
    {% if field.field.widget.input_type == "checkbox" %}
      <div class="flex items-center gap-2">
        {{ field }}
        <span class="text-sm text-slate-600">{{ field.help_text }}</span>
      </div>
    {% else %}
      {{ field }}
      {% if field.help_text %}<p class="mt-1 text-xs text-slate-500">{{ field.help_text }}</p>{% endif %}
    {% endif %}
    {% if field.errors %}<p class="mt-1 text-xs text-red-600">{{ field.errors|striptags }}</p>{% endif %}
  </div>
{% endfor %}
