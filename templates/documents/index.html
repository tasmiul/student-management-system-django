{% extends 'base.html' %}
{% block content %}
<section class="space-y-5"><div class="flex items-center justify-between"><h1 class="text-3xl font-extrabold">Documents</h1>{% if is_admin %}<a class="rounded-lg bg-brand-700 px-3 py-2 text-sm font-semibold text-white" href="/documents/add/">Upload Document</a>{% endif %}</div><div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">{% for d in documents %}<div class="flex items-center justify-between border-b border-slate-100 py-2 text-sm"><span>{{ d.title }} ({{ d.get_category_display }}) {% if d.is_public %}<span class="text-emerald-700">Public</span>{% endif %}</span><a class="text-brand-700" href="{{ d.file.url }}">Download</a></div>{% empty %}<p>No documents available.</p>{% endfor %}</div></section>
{% endblock %}
