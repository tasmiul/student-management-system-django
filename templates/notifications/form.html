{% extends 'base.html' %}
{% block content %}
<section class="max-w-2xl rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
  <h1 class="mb-4 text-2xl font-extrabold">{{ title }}</h1>
  <form method="post" enctype="multipart/form-data" class="space-y-4">
    {% csrf_token %}
    {% include '_form_fields.html' %}
    <div class="flex items-center gap-2 pt-2">
      <button class="rounded-lg bg-brand-700 px-4 py-2 font-semibold text-white hover:bg-brand-600">Save</button>
      <a href="{% url 'notifications_center:index' %}" class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
