{% extends 'base.html' %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Audit Logs</h1>
<div class="bg-white rounded shadow overflow-x-auto"><table class="min-w-full"><thead><tr><th class="p-2 text-left">Time</th><th>User</th><th>Action</th><th>Object</th></tr></thead><tbody>{% for l in logs %}<tr class="border-t"><td class="p-2">{{ l.timestamp }}</td><td>{{ l.user }}</td><td>{{ l.action }}</td><td>{{ l.object_modified }}</td></tr>{% endfor %}</tbody></table></div>
{% endblock %}
