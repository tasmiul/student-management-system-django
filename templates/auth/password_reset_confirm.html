{% extends 'base.html' %}
{% block content %}
<section class="mx-auto mt-8 max-w-xl">
  <style>
    .auth-card input { width: 100%; border: 1px solid #cbd5e1; border-radius: 0.75rem; padding: 0.7rem 0.9rem; margin-top: 0.3rem; }
    .auth-card input:focus { outline: none; border-color: #1d4ed8; box-shadow: 0 0 0 4px #dbeafe; }
    .auth-card label { font-size: 0.875rem; font-weight: 700; color: #334155; }
    .auth-card ul.errorlist { margin: 0.35rem 0 0; color: #dc2626; font-size: 0.75rem; }
  </style>
  <div class="auth-card rounded-2xl border border-slate-200 bg-white p-6 shadow-soft">
    <h1 class="text-2xl font-extrabold text-slate-900">Set New Password</h1>
    <p class="mt-1 text-sm text-slate-500">Choose a new password for your account.</p>
    <form method="post" class="mt-5 space-y-4">
      {% csrf_token %}
      {% for field in form %}
        <div>
          {{ field.label_tag }}
          {{ field }}
          {% if field.errors %}{{ field.errors }}{% endif %}
        </div>
      {% endfor %}
      <button class="w-full rounded-xl bg-brand-700 px-4 py-2.5 text-sm font-bold text-white hover:bg-brand-900">Set Password</button>
    </form>
  </div>
</section>
{% endblock %}
